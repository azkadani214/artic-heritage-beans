services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artic-heritage-beans-app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - .env
    volumes:
      # Bind mounts untuk persisten data, sehingga aman di-backup dan diakses langsung
      - ./storage:/var/www/html/storage
      - ./bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - bowpeople
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    image: nginx:alpine
    container_name: artic-heritage-beans-web
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      # Mount Nginx config
      - ./:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bowpeople
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Contoh Service Scheduler (Uncomment jika diperlukan cron jobs Laravel)
  # scheduler:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: artic-heritage-beans-scheduler
  #   restart: unless-stopped
  #   command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
  #   volumes:
  #     - ./storage:/var/www/html/storage
  #     - ./bootstrap-cache:/var/www/html/bootstrap/cache
  #   networks:
  #     - bowpeople

networks:
  bowpeople:
    external: true
    name: bowpeople-network

